<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>FitLog 飲食運動追蹤</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f5; }
  textarea { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const GOALS   = { protein:115, fat:60, carbs:200, calories:1800 };
const AI_URL  = "https://api.anthropic.com/v1/messages";
const MODEL   = "claude-sonnet-4-20250514";
const URL_KEY = "fitlog2_gs_url";

const calcCal  = (p,f,c) => Math.round((+p||0)*4+(+f||0)*9+(+c||0)*4);
const fmtDate  = d => d.toISOString().slice(0,10);
const todayStr = () => fmtDate(new Date());
const addDays  = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return fmtDate(r); };

const loadApiUrl = () => localStorage.getItem(URL_KEY)||"";
const saveApiUrl = url => localStorage.setItem(URL_KEY, url);

async function callAI(messages, system) {
  const res = await fetch(AI_URL, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({model:MODEL, max_tokens:1000, system, messages})
  });
  const data = await res.json();
  return data.content?.[0]?.text||"";
}

const css = {
  app:   { fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif', background:"#f5f5f5", minHeight:"100vh", maxWidth:480, margin:"0 auto", paddingBottom:110 },
  card:  { background:"#fff", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,0.08)", padding:16, margin:"0 12px 12px" },
  btn:   (bg,color="#fff")=>({ background:bg, color, border:"none", borderRadius:12, fontWeight:600, fontSize:15, cursor:"pointer", minHeight:44, display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"0 18px", fontFamily:"inherit" }),
  btn52: (bg,color="#fff")=>({ background:bg, color, border:"none", borderRadius:13, fontWeight:700, fontSize:15, cursor:"pointer", minHeight:52, flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6, fontFamily:"inherit" }),
  input: { width:"100%", border:"1.5px solid #e5e5e5", borderRadius:10, padding:"11px 13px", fontSize:15, outline:"none", boxSizing:"border-box", fontFamily:"inherit", background:"#fafafa" },
  label: { fontSize:13, color:"#666", fontWeight:500, marginBottom:4, display:"block" },
  overlay: { position:"fixed", inset:0, background:"rgba(0,0,0,0.45)", zIndex:50, display:"flex", alignItems:"flex-end" },
  sheet:   { background:"#fff", borderRadius:"20px 20px 0 0", width:"100%", maxHeight:"92vh", overflowY:"auto", padding:"20px 16px 36px" },
  tab:   a=>({ flex:1, padding:"10px 0", border:"none", background:"none", fontWeight:a?700:400, fontSize:14, color:a?"#007aff":"#888", borderBottom:a?"2px solid #007aff":"2px solid transparent", cursor:"pointer", fontFamily:"inherit" }),
  toast: { position:"fixed", bottom:120, left:"50%", transform:"translateX(-50%)", background:"rgba(0,0,0,0.82)", color:"#fff", borderRadius:20, padding:"10px 22px", fontSize:14, zIndex:200, whiteSpace:"nowrap" },
};

function DateNav({date,setDate}) {
  const isToday=date===todayStr();
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}>
      <button onClick={()=>setDate(addDays(date,-1))} style={{...css.btn("#f0f0f0","#333"),minHeight:36,padding:"0 14px",borderRadius:8}}>‹</button>
      <span style={{fontSize:14,fontWeight:600,minWidth:130,textAlign:"center"}}>
        {date}{isToday&&<span style={{marginLeft:6,background:"#007aff",color:"#fff",borderRadius:6,padding:"1px 7px",fontSize:11}}>今天</span>}
      </span>
      <button onClick={()=>!isToday&&setDate(addDays(date,1))} disabled={isToday}
        style={{...css.btn(isToday?"#f5f5f5":"#f0f0f0",isToday?"#ccc":"#333"),minHeight:36,padding:"0 14px",borderRadius:8,cursor:isToday?"default":"pointer"}}>›</button>
    </div>
  );
}

function MacroBar({label,val,goal,color}) {
  const pct=Math.min((val/goal)*100,100), over=val>goal;
  return (
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:13,fontWeight:500}}>{label}</span>
        <span style={{fontSize:13,color:over?"#ef4444":"#333"}}>{val}g / {goal}g</span>
      </div>
      <div style={{background:"#eee",borderRadius:6,height:8,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,background:over?"#ef4444":color,height:"100%",borderRadius:6,transition:"width .3s"}}/>
      </div>
    </div>
  );
}

function ImageUploadRow({label,onImage}) {
  const [mode,setMode]=useState("gallery");
  const [preview,setPreview]=useState(null);
  const ref=useRef();
  const handleFile=e=>{
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{setPreview(ev.target.result);onImage(ev.target.result);};
    reader.readAsDataURL(file);
  };
  return (
    <div style={{marginBottom:14}}>
      <div style={css.label}>{label}</div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        {["camera","gallery"].map(m=>(
          <button key={m} onClick={()=>setMode(m)} style={{...css.btn(mode===m?"#007aff":"#f0f0f0",mode===m?"#fff":"#333"),flex:1,minHeight:40,borderRadius:10,fontSize:13}}>
            {m==="camera"?"📷 直接拍照":"🖼 從相簿選取"}
          </button>
        ))}
      </div>
      <input ref={ref} type="file" accept="image/*" capture={mode==="camera"?"environment":undefined} style={{display:"none"}} onChange={handleFile}/>
      <button onClick={()=>{ref.current.value="";ref.current.click();}}
        style={{...css.btn("#f5f5f5","#333"),width:"100%",minHeight:40,border:"1.5px dashed #ddd",borderRadius:10,fontSize:13}}>
        {preview?"✅ 已選取（點此重選）":"點此選取圖片"}
      </button>
      {preview&&<img src={preview} alt="" style={{width:"100%",borderRadius:10,marginTop:8,maxHeight:140,objectFit:"cover"}}/>}
    </div>
  );
}

function SetupScreen({onSetup,toast}) {
  const [url,setUrl]=useState("");
  const [testing,setTesting]=useState(false);
  const handle=async()=>{
    if(!url.trim())return;
    setTesting(true);
    await onSetup(url.trim());
    setTesting(false);
  };
  return (
    <div style={{...css.app,display:"flex",flexDirection:"column",padding:"40px 20px"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:48,marginBottom:8}}>🥗</div>
        <div style={{fontSize:24,fontWeight:800,marginBottom:4}}>FitLog</div>
        <div style={{fontSize:14,color:"#888"}}>連線 Google Sheets 後開始使用</div>
      </div>
      <div style={{...css.card,marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>📋 設定步驟</div>
        {[
          "建立一個新的 Google 試算表",
          "點選「擴充功能」→「Apps Script」",
          "刪除預設內容，貼上 fitlog_appscript.gs 程式碼",
          "點上方「儲存」後，點「部署」→「新增部署作業」",
          "類型選「網頁應用程式」，執行身分「我」，存取權「所有人」",
          "按「部署」，複製產生的網址，貼到下方"
        ].map((s,i)=>(
          <div key={i} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
            <span style={{background:"#007aff",color:"#fff",borderRadius:"50%",width:22,height:22,minWidth:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,marginTop:1}}>{i+1}</span>
            <span style={{fontSize:13,color:"#444",lineHeight:1.6}}>{s}</span>
          </div>
        ))}
      </div>
      <div style={{marginBottom:12}}>
        <div style={css.label}>Apps Script 網址</div>
        <input value={url} onChange={e=>setUrl(e.target.value)}
          placeholder="https://script.google.com/macros/s/..."
          style={css.input}/>
      </div>
      <button onClick={handle} disabled={!url.trim()||testing}
        style={{...css.btn((!url.trim()||testing)?"#c5d5f5":"#007aff"),width:"100%",minHeight:52,borderRadius:13,fontSize:16,fontWeight:700}}>
        {testing?"⏳ 測試連線中...":"✓ 連線並開始使用"}
      </button>
      {toast&&<div style={css.toast}>{toast}</div>}
    </div>
  );
}

function FoodSheet({defaultDate,settings,onAdd,onClose}) {
  const [date,setDate]=useState(defaultDate);
  const [desc,setDesc]=useState("");
  const [img,setImg]=useState(null);
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const handleAI=async()=>{
    setLoading(true);setErr("");setResult(null);
    try{
      const content=[];
      if(img){const[h,d]=img.split(",");content.push({type:"image",source:{type:"base64",media_type:h.match(/:(.*?);/)?.[1]||"image/jpeg",data:d}});}
      content.push({type:"text",text:`食物：${desc||"（根據圖片判斷）"}\n${settings.defaultRules?"規則："+settings.defaultRules:""}`});
      const text=await callAI([{role:"user",content}],`你是營養師。根據食物描述或圖片估算每份的三大營養素。只回傳JSON：{"protein":數字,"fat":數字,"carbs":數字,"confidence":"高/中/低"}。不含熱量欄位。`);
      setResult(JSON.parse(text.replace(/```json|```/g,"").trim()));
    }catch{setErr("AI 分析失敗，請重試");}
    setLoading(false);
  };
  const handleAdd=()=>{
    onAdd(date,{desc:desc||"食物",protein:+result.protein||0,fat:+result.fat||0,carbs:+result.carbs||0,time:new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"})});
  };
  const confColor=result?.confidence==="高"?"#22c55e":result?.confidence==="中"?"#f59e0b":"#ef4444";
  return (
    <div style={css.overlay} onClick={onClose}>
      <div style={css.sheet} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <b style={{fontSize:17}}>🍽 新增飲食</b>
          <button onClick={onClose} style={{...css.btn("#f5f5f5","#666"),minHeight:36,padding:"0 12px",borderRadius:8,fontSize:18}}>×</button>
        </div>
        <div style={{marginBottom:14}}><div style={css.label}>日期</div><DateNav date={date} setDate={setDate}/></div>
        <div style={{marginBottom:14}}>
          <div style={css.label}>描述</div>
          <input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="例：麥當勞大麥克、滷肉飯小碗..." style={css.input}/>
        </div>
        <ImageUploadRow label="食物圖片（可選）" onImage={setImg}/>
        <button onClick={handleAI} disabled={loading||(!desc&&!img)}
          style={{...css.btn(loading?"#e5e5e5":"#7c3aed"),width:"100%",minHeight:48,borderRadius:12,marginBottom:12,opacity:(!desc&&!img)?0.5:1}}>
          {loading?"⏳ 分析中...":"🤖 AI 分析營養素"}
        </button>
        {err&&<div style={{color:"#ef4444",fontSize:13,marginBottom:10}}>{err}</div>}
        {result&&(
          <div style={{background:"#f8f9ff",borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <b style={{fontSize:14}}>分析結果</b>
              <span style={{background:confColor,color:"#fff",borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:600}}>信心度 {result.confidence}</span>
            </div>
            <div style={{display:"flex",gap:8}}>
              {[["蛋白質",result.protein,"g","#3b82f6"],["脂肪",result.fat,"g","#f59e0b"],["碳水",result.carbs,"g","#a78bfa"],["熱量",calcCal(result.protein,result.fat,result.carbs),"kcal","#22c55e"]].map(([l,v,u,c])=>(
                <div key={l} style={{flex:1,textAlign:"center",background:"#fff",borderRadius:10,padding:"8px 4px"}}>
                  <div style={{fontSize:18,fontWeight:700,color:c}}>{v}</div>
                  <div style={{fontSize:10,color:"#888"}}>{l} {u}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:11,color:"#aaa",marginTop:8,textAlign:"center"}}>
              {result.protein}×4 + {result.fat}×9 + {result.carbs}×4 = {calcCal(result.protein,result.fat,result.carbs)} kcal
            </div>
          </div>
        )}
        <button onClick={handleAdd} disabled={!result}
          style={{...css.btn(!result?"#e5e5e5":"#007aff"),width:"100%",minHeight:52,borderRadius:13,fontSize:16,fontWeight:700,opacity:!result?0.6:1}}>
          ✓ 確認新增
        </button>
      </div>
    </div>
  );
}

function ExerciseSheet({defaultDate,onAdd,onClose}) {
  const [date,setDate]=useState(defaultDate);
  const [desc,setDesc]=useState("");
  const [img,setImg]=useState(null);
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const handleAI=async()=>{
    setLoading(true);setErr("");setResult(null);
    try{
      const content=[];
      if(img){const[h,d]=img.split(",");content.push({type:"image",source:{type:"base64",media_type:h.match(/:(.*?);/)?.[1]||"image/jpeg",data:d}});}
      content.push({type:"text",text:`運動：${desc||"（根據截圖判斷）"}`});
      const text=await callAI([{role:"user",content}],`你是健身教練。根據運動描述或Apple Watch截圖解析Active Calories和時長(分鐘)。只回傳JSON：{"calories":數字,"duration":數字}。`);
      setResult(JSON.parse(text.replace(/```json|```/g,"").trim()));
    }catch{setErr("AI 解析失敗，請重試");}
    setLoading(false);
  };
  const handleAdd=()=>{
    onAdd(date,{desc:desc||"運動",calories:+result?.calories||0,duration:+result?.duration||0,time:new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"})});
  };
  return (
    <div style={css.overlay} onClick={onClose}>
      <div style={css.sheet} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <b style={{fontSize:17}}>🏃 新增運動</b>
          <button onClick={onClose} style={{...css.btn("#f5f5f5","#666"),minHeight:36,padding:"0 12px",borderRadius:8,fontSize:18}}>×</button>
        </div>
        <div style={{marginBottom:14}}><div style={css.label}>日期</div><DateNav date={date} setDate={setDate}/></div>
        <div style={{marginBottom:14}}>
          <div style={css.label}>描述</div>
          <input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="例：跑步30分鐘、重訓胸背..." style={css.input}/>
        </div>
        <ImageUploadRow label="Apple Watch 截圖（可選）" onImage={setImg}/>
        <button onClick={handleAI} disabled={loading||(!desc&&!img)}
          style={{...css.btn(loading?"#e5e5e5":"#22c55e"),width:"100%",minHeight:48,borderRadius:12,marginBottom:12,opacity:(!desc&&!img)?0.5:1}}>
          {loading?"⏳ 解析中...":"🤖 AI 解析運動數據"}
        </button>
        {err&&<div style={{color:"#ef4444",fontSize:13,marginBottom:10}}>{err}</div>}
        {result&&(
          <div style={{background:"#f0fff4",borderRadius:12,padding:14,marginBottom:14}}>
            <b style={{fontSize:14,display:"block",marginBottom:10}}>解析結果</b>
            <div style={{display:"flex",gap:12}}>
              <div style={{flex:1,textAlign:"center",background:"#fff",borderRadius:10,padding:"10px 0"}}>
                <div style={{fontSize:24,fontWeight:800,color:"#22c55e"}}>{result.calories}</div>
                <div style={{fontSize:12,color:"#888"}}>Active Calories</div>
              </div>
              <div style={{flex:1,textAlign:"center",background:"#fff",borderRadius:10,padding:"10px 0"}}>
                <div style={{fontSize:24,fontWeight:800,color:"#3b82f6"}}>{result.duration}</div>
                <div style={{fontSize:12,color:"#888"}}>時長（分鐘）</div>
              </div>
            </div>
          </div>
        )}
        <button onClick={handleAdd} disabled={!result}
          style={{...css.btn(!result?"#e5e5e5":"#22c55e"),width:"100%",minHeight:52,borderRadius:13,fontSize:16,fontWeight:700,opacity:!result?0.6:1}}>
          ✓ 確認新增
        </button>
      </div>
    </div>
  );
}

function QuickAddSheet({favorites,onAdd,onClose}) {
  return (
    <div style={css.overlay} onClick={onClose}>
      <div style={css.sheet} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <b style={{fontSize:17}}>⚡ 快速新增常用</b>
          <button onClick={onClose} style={{...css.btn("#f5f5f5","#666"),minHeight:36,padding:"0 12px",borderRadius:8,fontSize:18}}>×</button>
        </div>
        {favorites.length===0&&<div style={{color:"#aaa",textAlign:"center",padding:"24px 0",fontSize:14}}>請先至「常用」頁籤新增常用食物</div>}
        {favorites.map((fav,i)=>(
          <button key={i} onClick={()=>onAdd(fav)}
            style={{display:"flex",width:"100%",alignItems:"center",justifyContent:"space-between",background:"#f8f9ff",border:"none",borderRadius:12,padding:"13px 14px",marginBottom:8,cursor:"pointer",fontFamily:"inherit"}}>
            <div style={{textAlign:"left"}}>
              <div style={{fontWeight:600,fontSize:15}}>{fav.name}</div>
              <div style={{fontSize:12,color:"#888",marginTop:2}}>P {fav.protein}g | F {fav.fat}g | C {fav.carbs}g</div>
            </div>
            <div style={{fontWeight:700,fontSize:15,color:"#007aff"}}>{calcCal(fav.protein,fav.fat,fav.carbs)} kcal</div>
          </button>
        ))}
      </div>
    </div>
  );
}

function FavoritesTab({favorites,onSave,settings,onAddToDay}) {
  const [adding,setAdding]=useState(false);
  const [editIdx,setEditIdx]=useState(null);
  const [form,setForm]=useState({name:"",protein:"",fat:"",carbs:""});
  const [aiLoading,setAiLoading]=useState(false);
  const previewCal=calcCal(+form.protein||0,+form.fat||0,+form.carbs||0);
  const reset=()=>{setForm({name:"",protein:"",fat:"",carbs:""});setAdding(false);setEditIdx(null);};
  const handleSave=()=>{
    if(!form.name)return;
    const item={name:form.name,protein:+form.protein||0,fat:+form.fat||0,carbs:+form.carbs||0};
    onSave(editIdx!==null?favorites.map((f,i)=>i===editIdx?item:f):[...favorites,item]);
    reset();
  };
  const handleAI=async()=>{
    if(!form.name)return;
    setAiLoading(true);
    try{
      const text=await callAI([{role:"user",content:`食物：${form.name}\n${settings.defaultRules?"規則："+settings.defaultRules:""}`}],`你是營養師，估算每份的三大營養素。只回傳JSON：{"protein":數字,"fat":數字,"carbs":數字}。`);
      const j=JSON.parse(text.replace(/```json|```/g,"").trim());
      setForm(f=>({...f,protein:String(j.protein||""),fat:String(j.fat||""),carbs:String(j.carbs||"")}));
    }catch{}
    setAiLoading(false);
  };
  return (
    <div>
      <div style={css.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <b style={{fontSize:15}}>⭐ 常用食物</b>
          {!adding&&editIdx===null&&<button onClick={()=>setAdding(true)} style={{...css.btn("#007aff"),minHeight:36,padding:"0 14px",borderRadius:10,fontSize:13}}>+ 新增</button>}
        </div>
        {(adding||editIdx!==null)&&(
          <div style={{background:"#f8f9ff",borderRadius:12,padding:14,marginBottom:12}}>
            <input placeholder="食物名稱" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={{...css.input,marginBottom:8}}/>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              {[["protein","蛋白質g"],["fat","脂肪g"],["carbs","碳水g"]].map(([k,l])=>(
                <input key={k} type="number" placeholder={l} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} style={{...css.input,flex:1,padding:"10px 8px",fontSize:14}}/>
              ))}
            </div>
            <div style={{fontSize:13,color:"#666",marginBottom:10}}>熱量 = {form.protein||0}×4 + {form.fat||0}×9 + {form.carbs||0}×4 = <b>{previewCal} kcal</b></div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={handleAI} disabled={aiLoading} style={{...css.btn("#f0f4ff","#3b82f6"),flex:1,minHeight:40,borderRadius:10,fontSize:13,border:"1px solid #c7d7fd"}}>
                {aiLoading?"⏳ 估算中...":"🤖 AI 估算"}
              </button>
              <button onClick={handleSave} style={{...css.btn("#007aff"),flex:1,minHeight:40,borderRadius:10,fontSize:13}}>✓ 儲存</button>
              <button onClick={reset} style={{...css.btn("#f5f5f5","#666"),minHeight:40,padding:"0 14px",borderRadius:10,fontSize:13}}>取消</button>
            </div>
          </div>
        )}
        {favorites.length===0&&!adding&&<div style={{color:"#aaa",fontSize:14,textAlign:"center",padding:"16px 0"}}>尚未新增常用食物</div>}
        {favorites.map((fav,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",padding:"10px 0",borderBottom:i<favorites.length-1?"1px solid #f0f0f0":"none",gap:8}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14}}>{fav.name}</div>
              <div style={{fontSize:12,color:"#888",marginTop:2}}>P {fav.protein}g | F {fav.fat}g | C {fav.carbs}g | {calcCal(fav.protein,fav.fat,fav.carbs)} kcal</div>
            </div>
            <button onClick={()=>onAddToDay(fav)} style={{...css.btn("#e8fff0","#22c55e"),minHeight:34,padding:"0 10px",borderRadius:8,fontSize:13,border:"1px solid #bbf7d0"}}>+加入</button>
            <button onClick={()=>{setEditIdx(i);setForm({name:fav.name,protein:String(fav.protein),fat:String(fav.fat),carbs:String(fav.carbs)});setAdding(false);}} style={{...css.btn("#f0f0f0","#555"),minHeight:34,padding:"0 10px",borderRadius:8,fontSize:13}}>✎</button>
            <button onClick={()=>onSave(favorites.filter((_,j)=>j!==i))} style={{...css.btn("#fff2f2","#f03"),minHeight:34,padding:"0 10px",borderRadius:8,fontSize:16,border:"1px solid #ffd0d0"}}>×</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function HistoryTab({history,histLoading,onSelect}) {
  return (
    <div style={css.card}>
      <b style={{fontSize:15,display:"block",marginBottom:12}}>📅 歷史記錄</b>
      {histLoading&&<div style={{color:"#aaa",fontSize:14,textAlign:"center",padding:"16px 0"}}>⏳ 載入中...</div>}
      {!histLoading&&history.length===0&&<div style={{color:"#aaa",fontSize:14,textAlign:"center",padding:"16px 0"}}>尚無歷史紀錄</div>}
      {history.map(d=>(
        <button key={d.date} onClick={()=>onSelect(d.date)}
          style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"11px 0",background:"none",border:"none",borderBottom:"1px solid #f5f5f5",cursor:"pointer",fontFamily:"inherit"}}>
          <div style={{textAlign:"left"}}>
            <div style={{fontWeight:600,fontSize:14}}>{d.date}</div>
            <div style={{fontSize:12,color:"#888",marginTop:2}}>飲食 {d.foodCount} 筆 | 蛋白質 {d.protein}g</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontWeight:700,color:d.net>GOALS.calories?"#ef4444":"#22c55e",fontSize:16}}>{d.net}</div>
            <div style={{fontSize:11,color:"#aaa"}}>淨熱量</div>
          </div>
        </button>
      ))}
    </div>
  );
}

function SettingsSheet({settings,onSave,onClose,onDisconnect}) {
  const [rules,setRules]=useState(settings.defaultRules||"");
  return (
    <div style={css.overlay} onClick={onClose}>
      <div style={css.sheet} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <b style={{fontSize:17}}>⚙ 目標設定</b>
          <button onClick={onClose} style={{...css.btn("#f5f5f5","#666"),minHeight:36,padding:"0 12px",borderRadius:8,fontSize:18}}>×</button>
        </div>
        {[["每日熱量目標",`${GOALS.calories} kcal`,"由三大營養素自動計算"],["蛋白質目標",`${GOALS.protein} g`,""],["脂肪上限",`${GOALS.fat} g`,""],["碳水目標",`${GOALS.carbs} g`,""]].map(([l,v,note])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 0",borderBottom:"1px solid #f0f0f0"}}>
            <div>
              <div style={{fontWeight:600,fontSize:14}}>{l}</div>
              {note&&<div style={{fontSize:12,color:"#aaa",marginTop:2}}>{note}</div>}
            </div>
            <div style={{fontWeight:700,fontSize:16,color:"#007aff"}}>{v}</div>
          </div>
        ))}
        <div style={{marginTop:16,padding:14,background:"#f8f9ff",borderRadius:12,fontSize:13,color:"#666",lineHeight:1.7}}>
          熱量公式：{GOALS.protein}×4 + {GOALS.fat}×9 + {GOALS.carbs}×4 = {calcCal(GOALS.protein,GOALS.fat,GOALS.carbs)} kcal ✓
        </div>
        <div style={{marginTop:16}}>
          <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>📋 預設估算規則</div>
          <div style={{fontSize:12,color:"#aaa",marginBottom:8}}>AI 分析食物時會自動套用</div>
          <textarea value={rules} onChange={e=>setRules(e.target.value)} placeholder="例：飲料預設手搖杯大杯700ml，雞胸肉預設100g水煮" style={{...css.input,minHeight:80,resize:"vertical"}}/>
          <button onClick={()=>onSave({...settings,defaultRules:rules})} style={{...css.btn("#007aff"),width:"100%",minHeight:44,borderRadius:12,marginTop:8}}>儲存規則</button>
        </div>
        <button onClick={onDisconnect} style={{...css.btn("#fff2f2","#f03"),width:"100%",minHeight:44,borderRadius:12,marginTop:10,border:"1px solid #ffd0d0",fontSize:13}}>
          重新設定 Google Sheets 連線
        </button>
        <button onClick={onClose} style={{...css.btn("#f5f5f5","#555"),width:"100%",minHeight:44,borderRadius:12,marginTop:8}}>關閉</button>
      </div>
    </div>
  );
}

function App() {
  const [apiUrl,setApiUrl]   = useState(()=>loadApiUrl());
  const [isReady,setIsReady] = useState(()=>!!loadApiUrl());
  const [date,setDate]       = useState(todayStr());
  const [tab,setTab]         = useState("records");
  const [dayData,setDayData] = useState({food:[],exercise:[]});
  const [history,setHistory] = useState([]);
  const [histLoading,setHistLoading] = useState(false);
  const [favorites,setFavorites]     = useState([]);
  const [settings,setSettings]       = useState({defaultRules:""});
  const [loading,setLoading]   = useState(false);
  const [toast,setToast]       = useState(null);
  const [sheet,setSheet]       = useState(null);
  const [confirmDel,setConfirmDel] = useState(null);
  const [kbOpen,setKbOpen]     = useState(false);

  useEffect(()=>{
    const check=()=>setKbOpen(window.innerHeight-(window.visualViewport?.height||window.innerHeight)>150);
    const vp=window.visualViewport;
    if(vp){vp.addEventListener("resize",check);return()=>vp.removeEventListener("resize",check);}
  },[]);

  useEffect(()=>{
    if(!isReady||!apiUrl)return;
    loadDay(date);
    loadFavsAndSettings();
  },[isReady]);

  useEffect(()=>{
    if(!isReady||!apiUrl)return;
    loadDay(date);
  },[date]);

  useEffect(()=>{
    if(tab==="history"&&isReady&&history.length===0)loadHistory();
  },[tab]);

  const api=async(params)=>{
    const u=new URL(apiUrl);
    Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,typeof v==="object"?JSON.stringify(v):String(v)));
    const res=await fetch(u.toString());
    return res.json();
  };

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};

  const loadDay=async(d)=>{
    setLoading(true);
    try{const data=await api({action:"getDay",date:d});setDayData(data);}
    catch{showToast("載入失敗，請檢查網路");}
    setLoading(false);
  };

  const loadHistory=async()=>{
    setHistLoading(true);
    try{const data=await api({action:"getHistory"});setHistory(data||[]);}
    catch{}
    setHistLoading(false);
  };

  const loadFavsAndSettings=async()=>{
    try{
      const[favs,sett]=await Promise.all([api({action:"getFavorites"}),api({action:"getSettings"})]);
      setFavorites(Array.isArray(favs)?favs:[]);
      setSettings(sett||{defaultRules:""});
    }catch{}
  };

  const addFood=async(d,entry)=>{
    try{
      const res=await api({action:"addLog",date:d,type:"food",entry});
      const newEntry={...entry,id:res.id};
      if(d===date)setDayData(prev=>({...prev,food:[...(prev.food||[]),newEntry]}));
      if(d!==todayStr())showToast(`已新增至 ${d}`);
      if(history.length>0)loadHistory();
    }catch{showToast("新增失敗");}
    setSheet(null);
  };

  const addExercise=async(d,entry)=>{
    try{
      const res=await api({action:"addLog",date:d,type:"exercise",entry});
      const newEntry={...entry,id:res.id};
      if(d===date)setDayData(prev=>({...prev,exercise:[...(prev.exercise||[]),newEntry]}));
      if(d!==todayStr())showToast(`已新增至 ${d}`);
      if(history.length>0)loadHistory();
    }catch{showToast("新增失敗");}
    setSheet(null);
  };

  const delFood=async(id)=>{
    try{
      await api({action:"deleteLog",id});
      setDayData(prev=>({...prev,food:(prev.food||[]).filter(f=>f.id!==id)}));
      if(history.length>0)loadHistory();
    }catch{showToast("刪除失敗");}
    setConfirmDel(null);
  };

  const delEx=async(id)=>{
    try{
      await api({action:"deleteLog",id});
      setDayData(prev=>({...prev,exercise:(prev.exercise||[]).filter(e=>e.id!==id)}));
      if(history.length>0)loadHistory();
    }catch{showToast("刪除失敗");}
    setConfirmDel(null);
  };

  const saveFavs=async(favs)=>{
    setFavorites(favs);
    try{await api({action:"saveFavorites",data:favs});}catch{showToast("儲存失敗");}
  };

  const saveSett=async(s)=>{
    setSettings(s);
    try{await api({action:"saveSettings",data:s});showToast("已儲存");}catch{showToast("儲存失敗");}
    setSheet(null);
  };

  const handleSetup=async(url)=>{
    try{
      const u=new URL(url);
      u.searchParams.set("action","ping");
      const res=await fetch(u.toString());
      const text=await res.text();
      let data;
      try{data=JSON.parse(text);}catch{showToast("回應格式錯誤："+text.slice(0,60));return;}
      if(data.status==="ok"){
        saveApiUrl(url);
        setApiUrl(url);
        setIsReady(true);
      }else{
        showToast("連線失敗："+JSON.stringify(data).slice(0,60));
      }
    }catch(err){
      showToast("無法連線："+err.message);
    }
  };

  const handleDisconnect=()=>{
    saveApiUrl("");
    setApiUrl("");setIsReady(false);setSheet(null);
    setDayData({food:[],exercise:[]});setHistory([]);
  };

  if(!isReady)return <SetupScreen onSetup={handleSetup} toast={toast}/>;

  const food=dayData.food||[];
  const exercise=dayData.exercise||[];
  const p=food.reduce((s,f)=>s+(f.protein||0),0);
  const fat=food.reduce((s,f)=>s+(f.fat||0),0);
  const c=food.reduce((s,f)=>s+(f.carbs||0),0);
  const intake=calcCal(p,fat,c);
  const burned=exercise.reduce((s,e)=>s+(e.calories||0),0);
  const net=intake-burned;
  const calColor=net<=GOALS.calories*0.85?"#22c55e":net<=GOALS.calories?"#f59e0b":"#ef4444";

  return (
    <div style={css.app}>
      <div style={{background:"#fff",padding:"14px 16px 0",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:19,fontWeight:800}}>🥗 FitLog</span>
          <button onClick={()=>setSheet("settings")} style={{...css.btn("#f0f0f0","#333"),minHeight:36,padding:"0 14px",borderRadius:10,fontSize:13}}>⚙ 設定</button>
        </div>
        <DateNav date={date} setDate={setDate}/>
        <div style={{textAlign:"center",padding:"12px 0 6px"}}>
          <div style={{fontSize:52,fontWeight:900,color:calColor,lineHeight:1}}>{loading?"…":net}</div>
          <div style={{fontSize:13,color:"#888",marginTop:2}}>淨攝入熱量 kcal</div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          {[["攝入",intake,"#3b82f6"],["消耗",burned,"#22c55e"],["目標",GOALS.calories,"#a78bfa"]].map(([l,v,color])=>(
            <div key={l} style={{flex:1,background:"#f8f8f8",borderRadius:10,padding:"8px 6px",textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:700,color}}>{v}</div>
              <div style={{fontSize:11,color:"#888"}}>{l} kcal</div>
            </div>
          ))}
        </div>
        <div style={{paddingBottom:8}}>
          <MacroBar label="蛋白質" val={p} goal={GOALS.protein} color="#3b82f6"/>
          <MacroBar label="脂肪"   val={fat} goal={GOALS.fat}   color="#f59e0b"/>
          <MacroBar label="碳水"   val={c}   goal={GOALS.carbs} color="#a78bfa"/>
        </div>
        <div style={{display:"flex",borderTop:"1px solid #f0f0f0"}}>
          {[["favorites","常用"],["history","歷史"],["records","紀錄"]].map(([k,l])=>(
            <button key={k} style={css.tab(tab===k)} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"12px 0 0"}}>
        {tab==="records"&&(
          <div>
            <div style={{margin:"0 12px 12px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,padding:"0 2px"}}>
                <span style={{fontSize:15,fontWeight:700}}>🍽 飲食紀錄</span>
                <span style={{fontSize:12,color:"#888"}}>{food.length} 筆 · {intake} kcal</span>
              </div>
              {food.length===0&&(
                <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",padding:"28px 0",textAlign:"center",color:"#bbb",fontSize:14}}>
                  {loading?"⏳ 載入中...":"尚無飲食紀錄"}<br/>
                  {!loading&&<span style={{fontSize:12,marginTop:4,display:"block"}}>點下方「+ 新增飲食」開始記錄</span>}
                </div>
              )}
              {food.map(f=>{
                const cal=calcCal(f.protein,f.fat,f.carbs);
                const isDel=confirmDel?.type==="food"&&confirmDel?.id===f.id;
                return (
                  <div key={f.id} style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,0.07)",marginBottom:8,overflow:"hidden"}}>
                    <div style={{display:"flex",alignItems:"center",padding:"12px 14px 10px",gap:10}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:15,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{f.desc}</div>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
                          {f.time&&<span style={{fontSize:11,color:"#bbb",background:"#f5f5f5",borderRadius:5,padding:"1px 6px"}}>{f.time}</span>}
                          <span style={{fontSize:12,fontWeight:700,color:"#3b82f6"}}>{cal} kcal</span>
                        </div>
                      </div>
                      {isDel?(
                        <div style={{display:"flex",gap:6,flexShrink:0}}>
                          <button onClick={()=>delFood(f.id)} style={{...css.btn("#ef4444"),minHeight:34,padding:"0 12px",borderRadius:9,fontSize:13}}>刪除</button>
                          <button onClick={()=>setConfirmDel(null)} style={{...css.btn("#f0f0f0","#555"),minHeight:34,padding:"0 12px",borderRadius:9,fontSize:13}}>取消</button>
                        </div>
                      ):(
                        <button onClick={()=>setConfirmDel({type:"food",id:f.id})} style={{...css.btn("#fff2f2","#f03"),minHeight:34,minWidth:34,padding:"0",borderRadius:9,fontSize:17,border:"1px solid #ffd0d0",flexShrink:0}}>×</button>
                      )}
                    </div>
                    <div style={{display:"flex",borderTop:"1px solid #f5f5f5"}}>
                      {[["蛋白質",f.protein,"g","#3b82f6"],["脂肪",f.fat,"g","#f59e0b"],["碳水",f.carbs,"g","#a78bfa"]].map(([l,v,u,col])=>(
                        <div key={l} style={{flex:1,textAlign:"center",padding:"8px 0",borderRight:l!=="碳水"?"1px solid #f5f5f5":"none"}}>
                          <div style={{fontSize:15,fontWeight:700,color:col}}>{v}<span style={{fontSize:11,fontWeight:400}}>{u}</span></div>
                          <div style={{fontSize:11,color:"#aaa",marginTop:1}}>{l}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{margin:"4px 12px 12px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,padding:"0 2px"}}>
                <span style={{fontSize:15,fontWeight:700}}>🏃 運動紀錄</span>
                <span style={{fontSize:12,color:"#888"}}>{exercise.length} 筆 · -{burned} kcal</span>
              </div>
              {exercise.length===0&&(
                <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",padding:"28px 0",textAlign:"center",color:"#bbb",fontSize:14}}>
                  {loading?"⏳ 載入中...":"尚無運動紀錄"}<br/>
                  {!loading&&<span style={{fontSize:12,marginTop:4,display:"block"}}>點下方「+ 新增運動」開始記錄</span>}
                </div>
              )}
              {exercise.map(e=>{
                const isDel=confirmDel?.type==="exercise"&&confirmDel?.id===e.id;
                return (
                  <div key={e.id} style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,0.07)",marginBottom:8,overflow:"hidden"}}>
                    <div style={{display:"flex",alignItems:"center",padding:"12px 14px 10px",gap:10}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:15,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.desc}</div>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
                          {e.time&&<span style={{fontSize:11,color:"#bbb",background:"#f5f5f5",borderRadius:5,padding:"1px 6px"}}>{e.time}</span>}
                        </div>
                      </div>
                      {isDel?(
                        <div style={{display:"flex",gap:6,flexShrink:0}}>
                          <button onClick={()=>delEx(e.id)} style={{...css.btn("#ef4444"),minHeight:34,padding:"0 12px",borderRadius:9,fontSize:13}}>刪除</button>
                          <button onClick={()=>setConfirmDel(null)} style={{...css.btn("#f0f0f0","#555"),minHeight:34,padding:"0 12px",borderRadius:9,fontSize:13}}>取消</button>
                        </div>
                      ):(
                        <button onClick={()=>setConfirmDel({type:"exercise",id:e.id})} style={{...css.btn("#fff2f2","#f03"),minHeight:34,minWidth:34,padding:"0",borderRadius:9,fontSize:17,border:"1px solid #ffd0d0",flexShrink:0}}>×</button>
                      )}
                    </div>
                    <div style={{display:"flex",borderTop:"1px solid #f5f5f5"}}>
                      <div style={{flex:1,textAlign:"center",padding:"8px 0",borderRight:"1px solid #f5f5f5"}}>
                        <div style={{fontSize:18,fontWeight:800,color:"#22c55e"}}>{e.calories}<span style={{fontSize:11,fontWeight:400}}>kcal</span></div>
                        <div style={{fontSize:11,color:"#aaa",marginTop:1}}>消耗熱量</div>
                      </div>
                      <div style={{flex:1,textAlign:"center",padding:"8px 0"}}>
                        <div style={{fontSize:18,fontWeight:800,color:"#64748b"}}>{e.duration||"—"}<span style={{fontSize:11,fontWeight:400}}>{e.duration?"分鐘":""}</span></div>
                        <div style={{fontSize:11,color:"#aaa",marginTop:1}}>運動時長</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {tab==="history"&&<HistoryTab history={history} histLoading={histLoading} onSelect={d=>{setDate(d);setTab("records");}}/>}
        {tab==="favorites"&&<FavoritesTab favorites={favorites} onSave={saveFavs} settings={settings} onAddToDay={async fav=>{await addFood(date,{...fav,desc:fav.name,time:new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"})});showToast(`已加入 ${fav.name}`);}}/>}
      </div>

      {!kbOpen&&tab!=="favorites"&&(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #eee",padding:"12px 12px 24px",zIndex:20}}>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <button style={css.btn52("#22c55e")} onClick={()=>setSheet("exercise")}>+ 新增運動</button>
            <button style={css.btn52("#007aff")} onClick={()=>setSheet("food")}>+ 新增飲食</button>
          </div>
          <button style={{...css.btn("#f97316"),width:"100%",minHeight:48,borderRadius:12,fontSize:15}} onClick={()=>setSheet("quickadd")}>
            ⚡ 快速新增常用
          </button>
        </div>
      )}

      {sheet==="food"&&<FoodSheet defaultDate={date} settings={settings} onAdd={addFood} onClose={()=>setSheet(null)}/>}
      {sheet==="exercise"&&<ExerciseSheet defaultDate={date} onAdd={addExercise} onClose={()=>setSheet(null)}/>}
      {sheet==="quickadd"&&<QuickAddSheet favorites={favorites} onAdd={async fav=>{await addFood(date,{...fav,desc:fav.name,time:new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"})});setSheet(null);showToast(`已加入 ${fav.name}`);}} onClose={()=>setSheet(null)}/>}
      {sheet==="settings"&&<SettingsSheet settings={settings} onSave={saveSett} onClose={()=>setSheet(null)} onDisconnect={handleDisconnect}/>}

      {toast&&<div style={css.toast}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
